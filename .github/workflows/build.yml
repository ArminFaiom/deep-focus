name: Build Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'

      - name: Generate Windows platform files
        run: flutter create --platforms=windows --project-name deep_focus .

      - name: Install dependencies
        run: flutter pub get

      # Patch generated CMakeLists.txt to use Ninja generator (VS-agnostic)
      - name: Select Ninja CMake generator
        run: |
          $cmake = Resolve-Path "windows\flutter\ephemeral\.plugin_symlinks\flutter_windows\CMakeLists.txt"
          $content = Get-Content $cmake
          $content = $content -replace 'Visual Studio 16 2019', 'Ninja'
          Set-Content $cmake $content

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip release
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip ${{ github.workspace }}/DeepFocus-Windows.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: DeepFocus-Windows
          path: DeepFocus-Windows.zip
